<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Сравнение — AI Content System</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css" id="mdCss"/>
</head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title">AI Content System</span>
    </div>
    <div class="page-body">

  <div class="page-header">
    <h1>⚖️ Сравнение текстов</h1>
    <p>Выберите две генерации для сравнения рядом</p>
  </div>

  <!-- Выбор -->
  <div style="display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap">
    <div style="flex:1">
      <label class="form-group"><span>Текст 1</span>
        <select id="sel1" onchange="loadGen(1)" style="width:100%;margin-top:6px">
          <option value="">— Выберите —</option>
          <option th:each="gen : ${generations}" th:value="${gen.id}"
                  th:text="${gen.topic} + ' (' + ${gen.contentType.displayName} + ')'"></option>
        </select>
      </label>
    </div>
    <div style="flex:1">
      <label class="form-group"><span>Текст 2</span>
        <select id="sel2" onchange="loadGen(2)" style="width:100%;margin-top:6px">
          <option value="">— Выберите —</option>
          <option th:each="gen : ${generations}" th:value="${gen.id}"
                  th:text="${gen.topic} + ' (' + ${gen.contentType.displayName} + ')'"></option>
        </select>
      </label>
    </div>
  </div>

  <!-- Split view -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="result-card">
      <div id="info1" style="margin-bottom:8px;font-size:13px;color:var(--text-muted)">Выберите генерацию</div>
      <div id="content1" class="markdown-body" style="min-height:200px"></div>
    </div>
    <div class="result-card">
      <div id="info2" style="margin-bottom:8px;font-size:13px;color:var(--text-muted)">Выберите генерацию</div>
      <div id="content2" class="markdown-body" style="min-height:200px"></div>
    </div>
  </div>


<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script>
async function loadGen(side) {
  const id = document.getElementById('sel'+side).value;
  if (!id) return;
  const resp = await fetch('/content/'+id+'/json');
  const data = await resp.json();
  document.getElementById('info'+side).textContent =
    data.topic + ' · ' + data.contentType + ' · ' + data.language + ' · ' + data.wordCount + ' слов';
  document.getElementById('content'+side).innerHTML = marked.parse(data.generatedText || '');
}
</script>
    </div>
  </div>
</div>
</body></html>
