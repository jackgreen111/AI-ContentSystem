<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<aside th:fragment="sidebar" class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-text">✦ AI Content</div>
    <div class="logo-sub">System v2.0</div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Главное</div>
    <a th:href="@{/dashboard}"        class="nav-item"><span class="nav-icon">🏠</span> Панель</a>
    <a th:href="@{/content/generate}" class="nav-item"><span class="nav-icon">✨</span> Генерировать</a>
    <a th:href="@{/content/math}"     class="nav-item"><span class="nav-icon">🔢</span> Математика</a>
    <a th:href="@{/content/upload-doc}" class="nav-item"><span class="nav-icon">📄</span> Загрузить файл</a>
    <div class="nav-section-label">Библиотека</div>
    <a th:href="@{/content/history}"   class="nav-item"><span class="nav-icon">📜</span> История</a>
    <a th:href="@{/content/library}"   class="nav-item"><span class="nav-icon">⭐</span> Библиотека</a>
    <a th:href="@{/content/templates}" class="nav-item"><span class="nav-icon">📋</span> Шаблоны</a>
    <div class="nav-section-label">Инструменты</div>
    <a th:href="@{/content/compare}"  class="nav-item"><span class="nav-icon">⚖️</span> Сравнение</a>
    <a th:href="@{/content/stats}"    class="nav-item"><span class="nav-icon">📊</span> Статистика</a>
    <a th:href="@{/profile}"          class="nav-item"><span class="nav-icon">👤</span> Профиль</a>
    <div class="nav-section-label" sec:authorize="hasRole('ADMIN')">Админ</div>
    <a sec:authorize="hasRole('ADMIN')" th:href="@{/admin}" class="nav-item"><span class="nav-icon">🔧</span> Панель админа</a>
  </nav>
  <div class="sidebar-footer">
    <button class="theme-btn" id="themeToggle"><span class="nav-icon">🌙</span> Тема</button>
    <form th:action="@{/auth/logout}" method="post" class="logout-form">
      <button type="submit" class="logout-btn"><span class="nav-icon">🚪</span> Выйти</button>
    </form>
  </div>
</aside>
</body>
</html>
