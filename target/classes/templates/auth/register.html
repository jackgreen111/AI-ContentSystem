<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Регистрация — AI Content System</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="auth-page">
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo-text">✦ AI Content System</div>
            <h1>Создать аккаунт</h1>
            <p>Регистрация бесплатна</p>
        </div>

        <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

        <form th:action="@{/auth/register}" method="post" class="auth-form">
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" name="username" placeholder="Иван Иванов" required minlength="2"/>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="example@mail.com" required/>
            </div>

            <div class="form-group password-wrapper" style="position: relative;">
                <label>Пароль</label>
                <input type="password" name="password"
                       placeholder="Мин. 8 символов, заглавная + цифра"
                       required minlength="8"
                       style="padding-right: 48px;"/>
                <button type="button" class="password-toggle"
                        style="position: absolute; right: 12px; top: 38px; background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-muted);">
                    👁️
                </button>
            </div>

            <div class="form-group password-wrapper" style="position: relative;">
                <label>Подтвердите пароль</label>
                <input type="password" name="confirmPassword"
                       placeholder="Повторите пароль"
                       required
                       style="padding-right: 48px;"/>
                <button type="button" class="password-toggle"
                        style="position: absolute; right: 12px; top: 38px; background: none; border: none; cursor: pointer; font-size: 20px; color: var(--text-muted);">
                    👁️
                </button>
            </div>

            <button type="submit" class="btn btn-primary btn-full btn-large">Зарегистрироваться →</button>
        </form>

        <div class="auth-footer">
            <p>Есть аккаунт? <a th:href="@{/auth/login}">Войти</a></p>
        </div>
    </div>
</div>

<script th:src="@{/js/main.js}"></script>
</body>
</html>
