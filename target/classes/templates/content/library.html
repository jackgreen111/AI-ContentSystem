<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Библиотека — AI Content System</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title">AI Content System</span>
    </div>
    <div class="page-body">

  <div class="page-header"><h1>⭐ Моя библиотека</h1><p>Сохранённые генерации</p></div>
  <div th:if="${#lists.isEmpty(generations)}" class="empty-state">
    <div class="empty-icon">⭐</div><p>Библиотека пуста. Сохраняйте понравившиеся генерации!</p>
  </div>
  <div class="generation-list" th:unless="${#lists.isEmpty(generations)}">
    <div th:each="gen : ${generations}" class="generation-card saved">
      <div class="gen-card-header">
        <span class="badge badge-primary" th:text="${gen.contentType.displayName}"></span>
        <span class="badge" th:text="${gen.language.displayName}"></span>
        <span class="badge badge-success">★ Сохранено</span>
        <span th:if="${gen.rating==1}">👍</span>
      </div>
      <div class="gen-card-topic" th:text="${gen.topic}"></div>
      <div class="gen-card-preview" th:text="${#strings.abbreviate(gen.generatedText,150)}"></div>
      <div class="gen-card-footer">
        <span class="gen-date" th:text="${#temporals.format(gen.createdAt,'dd.MM.yyyy HH:mm')}"></span>
        <div class="gen-card-actions">
          <a th:href="@{/content/view/{id}(id=${gen.id})}" class="btn btn-sm btn-outline">Открыть</a>
          <a th:href="@{/content/{id}/export/docx(id=${gen.id})}" class="btn btn-sm btn-outline">⬇ DOCX</a>
          <a th:href="@{/content/{id}/export/pdf(id=${gen.id})}" class="btn btn-sm btn-outline">⬇ PDF</a>
        </div>
      </div>
    </div>
  </div>

<script th:src="@{/js/main.js}"></script>
    </div>
  </div>
</div>
</body></html>
