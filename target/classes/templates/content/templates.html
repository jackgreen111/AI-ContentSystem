<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/><title>Шаблоны — AI Content System</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/></head>
<body>
<div class="app-layout">
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>
  <div class="main-content">
    <div class="topbar">
      <span class="topbar-title">AI Content System</span>
    </div>
    <div class="page-body">

  <div class="page-header">
    <h1>📋 Шаблоны запросов</h1>
    <p>Сохранённые промпты для быстрого старта</p>
  </div>

  <!-- Создать шаблон -->
  <div class="result-card" style="margin-bottom:24px">
    <h3 style="margin-bottom:12px">➕ Новый шаблон</h3>
    <form th:action="@{/content/templates/save}" method="post" style="display:flex;flex-direction:column;gap:12px">
      <div class="form-group">
        <label>Название шаблона</label>
        <input type="text" name="name" placeholder="Например: Учебное задание по Java" required/>
      </div>
      <div class="form-group">
        <label>Тема (текст промпта)</label>
        <textarea name="topic" rows="2" placeholder="Задание для студентов 3-го курса по..." required></textarea>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <select name="contentType" style="flex:1">
          <option th:each="t : ${contentTypes}" th:value="${t.name()}" th:text="${t.displayName}"></option>
        </select>
        <select name="style" style="flex:1">
          <option th:each="s : ${styles}" th:value="${s.name()}" th:text="${s.displayName}"></option>
        </select>
        <select name="language" style="flex:1">
          <option th:each="l : ${languages}" th:value="${l.name()}" th:text="${l.displayName}"></option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary" style="align-self:flex-start">Сохранить шаблон</button>
    </form>
  </div>

  <!-- Список шаблонов -->
  <div th:if="${#lists.isEmpty(templates)}" class="empty-state">
    <div class="empty-icon">📋</div>
    <p>Шаблонов пока нет. Создайте первый!</p>
  </div>
  <div class="generation-list" th:unless="${#lists.isEmpty(templates)}">
    <div th:each="tmpl : ${templates}" class="generation-card">
      <div class="gen-card-header">
        <span class="badge badge-primary" th:text="${tmpl.contentType}"></span>
        <span class="badge" th:text="${tmpl.language}"></span>
      </div>
      <div class="gen-card-topic" th:text="${tmpl.name}"></div>
      <div class="gen-card-preview" th:text="${tmpl.topic}"></div>
      <div class="gen-card-footer">
        <div class="gen-card-actions">
          <a th:href="@{/content/generate(topicPrefill=${tmpl.topic},typePrefill=${tmpl.contentType},langPrefill=${tmpl.language})}"
             class="btn btn-sm btn-primary">▶ Использовать</a>
          <form th:action="@{/content/templates/{id}/delete(id=${tmpl.id})}" method="post" style="display:inline"
                onsubmit="return confirm('Удалить шаблон?')">
            <button type="submit" class="btn btn-sm btn-danger">🗑</button>
          </form>
        </div>
      </div>
    </div>
  </div>

<script th:src="@{/js/main.js}"></script>
    </div>
  </div>
</div>
</body></html>
