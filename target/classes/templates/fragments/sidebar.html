<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<aside th:fragment="sidebar" class="sidebar" id="sidebar">

    <!-- Кнопка collapse (только десктоп) -->
    <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" title="Свернуть меню">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M15 18l-6-6 6-6"/>
        </svg>
    </button>

    <!-- Лого -->
    <div class="sidebar-logo">
        <div class="logo-icon">✦</div>
        <div class="logo-text-group">
            <div class="logo-text">AI Content System</div>
            <div class="logo-sub">v2.0</div>
        </div>
    </div>

    <!-- Поиск по истории -->
    <div class="sidebar-search">
        <div class="sidebar-search-inner">
            <span class="search-icon">🔍</span>
            <input type="text" id="sidebarSearch" placeholder="Поиск..." autocomplete="off"/>
        </div>
        <div class="sidebar-search-results" id="searchResults"></div>
    </div>

    <!-- Навигация -->
    <nav class="sidebar-nav">
        <div class="nav-section-label">Главное</div>
        <a th:href="@{/dashboard}"          class="nav-item" data-tooltip="Панель">
            <span class="nav-icon">🏠</span><span class="nav-label">Панель</span>
        </a>
        <a th:href="@{/content/generate}"   class="nav-item" data-tooltip="Генерировать">
            <span class="nav-icon">✨</span><span class="nav-label">Генерировать</span>
        </a>
        <a th:href="@{/content/math}"       class="nav-item" data-tooltip="Математика">
            <span class="nav-icon">🔢</span><span class="nav-label">Математика</span>
        </a>
        <a th:href="@{/content/upload-doc}" class="nav-item" data-tooltip="Загрузить файл">
            <span class="nav-icon">📄</span><span class="nav-label">Загрузить файл</span>
        </a>

        <div class="nav-section-label">Библиотека</div>
        <a th:href="@{/content/history}"    class="nav-item" data-tooltip="История">
            <span class="nav-icon">📜</span><span class="nav-label">История</span>
        </a>
        <a th:href="@{/content/library}"    class="nav-item" data-tooltip="Библиотека">
            <span class="nav-icon">⭐</span><span class="nav-label">Библиотека</span>
        </a>
        <a th:href="@{/content/templates}"  class="nav-item" data-tooltip="Шаблоны">
            <span class="nav-icon">📋</span><span class="nav-label">Шаблоны</span>
        </a>

        <div class="nav-section-label">Инструменты</div>
        <a th:href="@{/content/compare}"    class="nav-item" data-tooltip="Сравнение">
            <span class="nav-icon">⚖️</span><span class="nav-label">Сравнение</span>
        </a>
        <a th:href="@{/content/stats}"      class="nav-item" data-tooltip="Статистика">
            <span class="nav-icon">📊</span><span class="nav-label">Статистика</span>
        </a>
        <a th:href="@{/profile}"            class="nav-item" data-tooltip="Профиль">
            <span class="nav-icon">👤</span><span class="nav-label">Профиль</span>
        </a>

        <div class="nav-section-label" sec:authorize="hasRole('ADMIN')">Админ</div>
        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/admin}" class="nav-item" data-tooltip="Панель админа">
            <span class="nav-icon">🔧</span><span class="nav-label">Панель админа</span>
        </a>
    </nav>

    <!-- Футер -->
    <div class="sidebar-footer">
        <button class="sidebar-footer-btn" id="themeToggle" data-tooltip="Сменить тему">
            <span class="nav-icon">🌙</span><span class="nav-label">Тема</span>
        </button>
        <form th:action="@{/auth/logout}" method="post">
            <button type="submit" class="sidebar-footer-btn logout-btn" data-tooltip="Выйти">
                <span class="nav-icon">🚪</span><span class="nav-label">Выйти</span>
            </button>
        </form>
    </div>
</aside>

<!-- Overlay для мобильных -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Burger кнопка (мобильные) -->
<button class="sidebar-burger" id="sidebarBurger" aria-label="Меню">
    <span></span><span></span><span></span>
</button>
</body>
</html>
