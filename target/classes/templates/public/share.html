<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title th:text="${generation.topic} + ' — AI Content System'">Публичный контент</title>
<link rel="stylesheet" th:href="@{/css/style.css}"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-light.min.css"/>
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-brand">🤖 AI Content System</a>
  <div class="nav-links">
    <a href="/auth/register" class="btn btn-primary btn-sm">Попробовать</a>
  </div>
</nav>
<main class="container" style="max-width:800px">
  <div class="meta-panel">
    <h1 class="result-topic" th:text="${generation.topic}"></h1>
    <div class="meta-badges">
      <span class="badge badge-primary" th:text="${generation.contentType.displayName}"></span>
      <span class="badge" th:text="${generation.style.displayName}"></span>
      <span class="badge" th:text="${generation.language.displayName}"></span>
    </div>
    <div class="meta-info">
      <span>🕐 <span th:text="${#temporals.format(generation.createdAt,'dd.MM.yyyy HH:mm')}"></span></span>
      <span>📝 Слов: <span th:text="${generation.wordCount}"></span></span>
    </div>
  </div>

  <div class="result-card">
    <div class="markdown-body" th:attr="data-raw=${generation.generatedText}" id="mdView"></div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn btn-outline btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('mdView').getAttribute('data-raw')).then(()=>alert('Скопировано!'))">
        📋 Скопировать
      </button>
    </div>
  </div>

  <div style="text-align:center;margin-top:32px;padding:24px;background:var(--bg-card);border-radius:12px;border:1px solid var(--border)">
    <p style="font-size:18px;font-weight:600;margin-bottom:8px">Хотите создавать такой контент?</p>
    <p style="color:var(--text-muted);margin-bottom:16px">Зарегистрируйтесь бесплатно и получите доступ к AI-генерации</p>
    <a href="/auth/register" class="btn btn-primary btn-large">Попробовать бесплатно</a>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const el = document.getElementById('mdView');
  if (el) el.innerHTML = marked.parse(el.getAttribute('data-raw') || '');
</script>
</body></html>
